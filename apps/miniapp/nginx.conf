server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache hashed assets aggressively; never cache the HTML shell.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location = /index.html {
    add_header Cache-Control "no-store";
  }

  # Security headers. Telegram embeds the Mini App in an iframe, so frame-ancestors
  # must allow Telegram. Tighten connect-src to your exact API/RPC/price hosts in prod.
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "ALLOW-FROM https://web.telegram.org" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; frame-ancestors https://web.telegram.org https://*.telegram.org; base-uri 'self'; form-action 'self'" always;
}
